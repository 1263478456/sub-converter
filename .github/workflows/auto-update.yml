# ============================================================
#  自动检测上游 SubConverter-Extended 镜像更新并重新构建
#  每天北京时间 10:00 检查上游镜像是否有新 digest
#  有更新时自动构建并推送
# ============================================================

name: Auto Update

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 = 北京 10:00
  workflow_dispatch:

env:
  IMAGE_NAME: 1263478456/sub-converter
  UPSTREAM_IMAGE: aethersailor/subconverter-extended

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 检测上游 Extended 镜像是否有新 digest ----
      - name: Check upstream Extended image
        id: check_upstream
        run: |
          # 获取上游 latest 镜像的 digest
          LATEST_DIGEST=$(docker manifest inspect "${{ env.UPSTREAM_IMAGE }}:latest" \
            | jq -r '.config.digest // .manifests[0].digest // empty' 2>/dev/null || echo "unknown")

          # 从 Dockerfile 注释读取上次记录的 digest
          CURRENT=$(grep '# extended-digest:' Dockerfile 2>/dev/null \
            | head -1 | sed 's/.*: //' || echo "unknown")

          echo "latest=$LATEST_DIGEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "upstream: $CURRENT → $LATEST_DIGEST"

          if [ "$LATEST_DIGEST" != "$CURRENT" ] && [ "$LATEST_DIGEST" != "unknown" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # ---- 更新 Dockerfile 中的 digest 记录 ----
      - name: Update Dockerfile metadata
        if: steps.check_upstream.outputs.changed == 'true'
        run: |
          DIGEST="${{ steps.check_upstream.outputs.latest }}"
          DATE=$(date -u +%Y%m%d)

          if grep -q '# extended-digest:' Dockerfile; then
            sed -i "s|# extended-digest: .*|# extended-digest: $DIGEST|" Dockerfile
          else
            sed -i "1a # extended-digest: $DIGEST" Dockerfile
          fi

          echo "Updated Dockerfile: extended-digest=$DIGEST date=$DATE"

      # ---- 提交 Dockerfile 变更 ----
      - name: Commit changes
        if: steps.check_upstream.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff --cached --quiet || git commit -m "auto: upstream extended update"
          git push

      # ---- 构建并推送镜像 ----
      - name: Set up Docker Buildx
        if: steps.check_upstream.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check_upstream.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check_upstream.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- 汇总报告 ----
      - name: Summary
        if: always()
        run: |
          echo "## 🔄 Auto Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 上游镜像 | \`${{ env.UPSTREAM_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游 digest | \`${{ steps.check_upstream.outputs.latest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 本地记录 | \`${{ steps.check_upstream.outputs.current }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 有更新 | ${{ steps.check_upstream.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建 | ${{ steps.check_upstream.outputs.changed == 'true' && '✅ 已触发' || '⏭️ 跳过' }} |" >> $GITHUB_STEP_SUMMARY
