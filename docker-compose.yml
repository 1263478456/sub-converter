version: '3.8'

services:
  subconverter:
    image: aethersailor/subconverter-extended:latest
    container_name: subconverter
    restart: unless-stopped
    user: "950:950"
    ports:
      - "3216:25500"
    volumes:
      - /mnt/vol3/appdata/subconverter/base:/base
    environment:
      - TZ=Asia/Shanghai

  subweb:
    image: aethersailor/subweb:latest
    container_name: subweb
    restart: unless-stopped
    ports:
      - "3215:80"
    environment:
      - SITE_NAME=订阅转换
      - API_URL=http://subconverter:25500
    depends_on:
      - subconverter
