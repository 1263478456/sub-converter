<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订阅转换</title>
<style>
:root {
  --bg: #f5f7fa; --card: #fff; --text: #303133; --text2: #606266; --text3: #909399;
  --border: #dcdfe6; --primary: #409eff; --primary-dark: #337ecc;
  --success: #67c23a; --danger: #f56c6c; --input-bg: #fff;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --bg: #1a1a2e; --card: #16213e; --text: #e0e0e0; --text2: #b0b0b0; --text3: #808080;
  --border: #3a3a5c; --primary: #409eff; --primary-dark: #66b1ff;
  --input-bg: #1a1a2e; --shadow: 0 2px 12px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.header h1 { font-size: 22px; font-weight: 600; }
.theme-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.theme-btn:hover { border-color: var(--primary); color: var(--primary); }
.card { background: var(--card); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
.form-row { margin-bottom: 16px; }
.form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
textarea, input[type="text"], select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; color: var(--text); background: var(--input-bg); outline: none; transition: border .2s;
}
textarea:focus, input:focus, select:focus { border-color: var(--primary); }
textarea { resize: vertical; min-height: 80px; font-family: inherit; }
select { cursor: pointer; }
.checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
.checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; }
.checkbox-item input { accent-color: var(--primary); }
.toggle-section { cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--primary); margin-bottom: 12px; user-select: none; }
.toggle-section .arrow { transition: transform .2s; font-size: 12px; }
.toggle-section .arrow.open { transform: rotate(90deg); }
.advanced-content { display: none; }
.advanced-content.show { display: block; }
.ua-row { display: flex; gap: 8px; }
.ua-row select { width: 200px; flex-shrink: 0; }
.ua-row input { flex: 1; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { background: #a0cfff; cursor: not-allowed; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #5daf34; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #e04848; }
.result-box { margin-top: 16px; }
.result-box textarea { background: var(--bg); font-size: 13px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.footer { text-align: center; color: var(--text3); font-size: 12px; margin-top: 24px; }
.footer a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="container">
  <div class="header">
    <h1>📡 订阅转换</h1>
    <button class="theme-btn" onclick="toggleTheme()">🌓 主题</button>
  </div>

  <!-- 订阅链接 -->
  <div class="card">
    <div class="form-row">
      <label class="form-label">订阅链接 <span style="color:var(--text3);font-weight:400">(支持多链接，每行一个或 | 分隔)</span></label>
      <textarea id="subUrl" placeholder="粘贴你的订阅链接或节点链接..."></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">目标客户端</label>
      <select id="target"></select>
    </div>
  </div>

  <!-- 进阶选项 -->
  <div class="card">
    <div class="toggle-section" onclick="toggleAdvanced()">
      <span class="arrow" id="arrow">▶</span> 进阶选项
    </div>
    <div class="advanced-content" id="advancedContent">
      <div class="form-row">
        <label class="form-label">远程配置</label>
        <select id="remoteConfig"></select>
      </div>
      <div class="form-row">
        <label class="form-label">自定义 User-Agent</label>
        <div class="ua-row">
          <select id="uaPreset" onchange="applyUA(this.value)">
            <option value="">预设选择</option>
          </select>
          <input type="text" id="customUA" placeholder="留空则使用客户端默认 UA">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Include (包含节点，支持正则)</label>
        <input type="text" id="include" placeholder="例: (香港|HK)">
      </div>
      <div class="form-row">
        <label class="form-label">Exclude (排除节点，支持正则)</label>
        <input type="text" id="exclude" placeholder="例: (到期|剩余流量|官网)">
      </div>
      <div class="form-row">
        <label class="form-label">文件名</label>
        <input type="text" id="filename" placeholder="返回的订阅文件名">
      </div>
      <div class="form-row">
        <label class="form-label">选项</label>
        <div class="checkbox-grid">
          <label class="checkbox-item"><input type="checkbox" id="emoji" checked> Emoji</label>
          <label class="checkbox-item"><input type="checkbox" id="udp"> UDP</label>
          <label class="checkbox-item"><input type="checkbox" id="tfo"> TFO</label>
          <label class="checkbox-item"><input type="checkbox" id="scv"> 跳过证书验证</label>
          <label class="checkbox-item"><input type="checkbox" id="appendType"> 节点类型前缀</label>
          <label class="checkbox-item"><input type="checkbox" id="sort"> 排序节点</label>
          <label class="checkbox-item"><input type="checkbox" id="fdn" checked> 过滤非法节点</label>
          <label class="checkbox-item"><input type="checkbox" id="expand" checked> 规则展开</label>
          <label class="checkbox-item"><input type="checkbox" id="list"> 仅输出节点列表</label>
        </div>
      </div>
    </div>
  </div>

  <!-- 结果 -->
  <div class="card">
    <div class="form-row">
      <label class="form-label">定制订阅</label>
      <textarea id="result" readonly rows="3" placeholder="点击「生成订阅链接」后在此显示"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-danger" id="genBtn" onclick="generate()" disabled>🔗 生成订阅链接</button>
      <button class="btn btn-primary" id="copyBtn" onclick="copyResult()" disabled>📋 复制链接</button>
      <button class="btn btn-success" id="clashBtn" onclick="importClash()" disabled>⚡ 一键导入 Clash</button>
    </div>
  </div>

  <div class="footer">
    基于 <a href="https://github.com/tindy2013/subconverter" target="_blank">subconverter</a> 后端 ·
    规则集 <a href="https://github.com/ACL4SSR/ACL4SSR" target="_blank">ACL4SSR</a>
  </div>
</div>

<script>
// ===================== 配置数据 =====================

var TARGETS = [
  { value: "clash", label: "Clash" },
  { value: "clashr", label: "ClashR" },
  { value: "surge&ver=4", label: "Surge 4" },
  { value: "surge&ver=3", label: "Surge 3" },
  { value: "surge&ver=2", label: "Surge 2" },
  { value: "quan", label: "Quantumult" },
  { value: "quanx", label: "Quantumult X" },
  { value: "loon", label: "Loon" },
  { value: "surfboard", label: "Surfboard" },
  { value: "singbox", label: "sing-box" },
  { value: "ss", label: "SS (SIP002)" },
  { value: "sssub", label: "SS (软件订阅)" },
  { value: "ssr", label: "SSR" },
  { value: "v2ray", label: "V2Ray" },
  { value: "trojan", label: "Trojan" },
  { value: "mixed", label: "Mixed (Base64)" },
  { value: "auto", label: "Auto (自动识别)" }
];

var REMOTE_CONFIGS = [
  { group: "ACL4SSR", options: [
    { label: "ACL4SSR_Online 默认版 分组比较全", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" },
    { label: "ACL4SSR_Online_Mini 精简版 带港美日国家", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini.ini" },
    { label: "ACL4SSR_Online_Full 全分组 重度用户使用", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini" },
    { label: "ACL4SSR_Online_Full_MultiMode 全分组 多模式", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_MultiMode.ini" },
    { label: "ACL4SSR_Online_Full_NoAuto 全分组 无自动测速", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_NoAuto.ini" },
    { label: "ACL4SSR_Online_Full_AdblockPlus 全分组 更多去广告", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_AdblockPlus.ini" },
    { label: "ACL4SSR_Online_Full_Netflix 全分组 奈飞全量", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_Netflix.ini" },
    { label: "ACL4SSR_Online_Full_Google 全分组 谷歌细分", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_Google.ini" },
    { label: "ACL4SSR_Online_Mini_MultiCountry 精简版 多国分组", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_MultiCountry.ini" },
    { label: "ACL4SSR_Online_MultiPlatform 多平台版", value: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_MultiPlatform.ini" }
  ]},
  { group: "default", options: [
    { label: "No-Urltest", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/universal/no-urltest.ini" },
    { label: "Urltest", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/universal/urltest.ini" }
  ]},
  { group: "customized", options: [
    { label: "Maying", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/maying.ini" },
    { label: "Ytoo", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/ytoo.ini" },
    { label: "FlowerCloud", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/flowercloud.ini" },
    { label: "Nexitally", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/nexitally.ini" },
    { label: "SoCloud", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/socloud.ini" },
    { label: "ARK", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/ark.ini" },
    { label: "ssrCloud", value: "https://cdn.jsdelivr.net/gh/SleepyHeeead/subconverter-config@master/remote-config/customized/ssrcloud.ini" }
  ]}
];

var UA_PRESETS = [
  { label: "clash.meta", value: "clash.meta" },
  { label: "ClashForAndroid/2.5.12", value: "ClashForAndroid/2.5.12" },
  { label: "ClashX Pro/1.90.0", value: "ClashX Pro/1.90.0" },
  { label: "Quantumult X/1.0.0", value: "Quantumult%20X/1.0.0" },
  { label: "Surge/5.0", value: "Surge/5.0" },
  { label: "Shadowrocket", value: "Shadowrocket" },
  { label: "V2Box/1.0", value: "V2Box/1.0" },
  { label: "Stash/1.0", value: "Stash/1.0" }
];

// ===================== 初始化 =====================

var STORAGE_KEY = "sub-converter-";

function init() {
  // 填充客户端下拉
  var targetEl = document.getElementById("target");
  TARGETS.forEach(function(t) {
    var opt = document.createElement("option");
    opt.value = t.value; opt.textContent = t.label;
    targetEl.appendChild(opt);
  });

  // 填充远程配置下拉
  var rcEl = document.getElementById("remoteConfig");
  var noneOpt = document.createElement("option");
  noneOpt.value = ""; noneOpt.textContent = "不使用远程配置";
  rcEl.appendChild(noneOpt);
  REMOTE_CONFIGS.forEach(function(group) {
    var og = document.createElement("optgroup");
    og.label = group.group;
    group.options.forEach(function(o) {
      var opt = document.createElement("option");
      opt.value = o.value; opt.textContent = o.label;
      og.appendChild(opt);
    });
    rcEl.appendChild(og);
  });

  // 填充 UA 预设
  var uaEl = document.getElementById("uaPreset");
  UA_PRESETS.forEach(function(u) {
    var opt = document.createElement("option");
    opt.value = u.value; opt.textContent = u.label;
    uaEl.appendChild(opt);
  });

  // 恢复缓存
  restoreCache();

  // 监听输入变化自动缓存 + 更新按钮状态
  ["subUrl", "target", "remoteConfig", "customUA", "include", "exclude", "filename"].forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener("input", function() { saveCache(); updateBtns(); });
    el.addEventListener("change", function() { saveCache(); updateBtns(); });
  });

  updateBtns();
}

function updateBtns() {
  var hasUrl = document.getElementById("subUrl").value.trim().length > 0;
  var hasResult = document.getElementById("result").value.trim().length > 0;
  document.getElementById("genBtn").disabled = !hasUrl;
  document.getElementById("copyBtn").disabled = !hasResult;
  document.getElementById("clashBtn").disabled = !hasResult;
}

// ===================== 生成订阅链接 =====================

function generate() {
  var url = document.getElementById("subUrl").value.trim();
  if (!url) { showToast("请输入订阅链接"); return; }

  // 处理多链接（换行 → |）
  var urls = url.split(/\n/).map(function(s) { return s.trim(); }).filter(Boolean);
  var joinedUrl = urls.join("|");

  var target = document.getElementById("target").value;
  var config = document.getElementById("remoteConfig").value;
  var ua = document.getElementById("customUA").value.trim();
  var include = document.getElementById("include").value.trim();
  var exclude = document.getElementById("exclude").value.trim();
  var filename = document.getElementById("filename").value.trim();

  // 构建参数
  var params = [];
  params.push("target=" + target);
  params.push("url=" + encodeURIComponent(joinedUrl));
  if (config) params.push("config=" + encodeURIComponent(config));
  if (ua) params.push("ua=" + encodeURIComponent(ua));
  if (include) params.push("include=" + encodeURIComponent(include));
  if (exclude) params.push("exclude=" + encodeURIComponent(exclude));
  if (filename) params.push("filename=" + encodeURIComponent(filename));

  // 开关选项
  if (!document.getElementById("emoji").checked) params.push("emoji=false");
  if (document.getElementById("udp").checked) params.push("udp=true");
  if (document.getElementById("tfo").checked) params.push("tfo=true");
  if (document.getElementById("scv").checked) params.push("scv=true");
  if (document.getElementById("appendType").checked) params.push("append_type=true");
  if (document.getElementById("sort").checked) params.push("sort=true");
  if (!document.getElementById("fdn").checked) params.push("fdn=false");
  if (!document.getElementById("expand").checked) params.push("expand=false");
  if (document.getElementById("list").checked) params.push("list=true");

  var subUrl = location.origin + "/sub?" + params.join("&");
  document.getElementById("result").value = subUrl;
  updateBtns();
  saveCache();
  showToast("✅ 订阅链接已生成");
}

// ===================== 复制 & 导入 =====================

function copyResult() {
  var text = document.getElementById("result").value;
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast("✅ 已复制到剪贴板"); });
  } else {
    var ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("✅ 已复制到剪贴板");
  }
}

function importClash() {
  var text = document.getElementById("result").value;
  if (!text) return;
  window.open("clash://install-config?url=" + encodeURIComponent(text));
}

// ===================== UA 预设 =====================

function applyUA(val) {
  if (val) {
    document.getElementById("customUA").value = val;
    saveCache();
  }
}

// ===================== 进阶选项展开 =====================

function toggleAdvanced() {
  var content = document.getElementById("advancedContent");
  var arrow = document.getElementById("arrow");
  content.classList.toggle("show");
  arrow.classList.toggle("open");
}

// ===================== 主题 =====================

function toggleTheme() {
  var current = document.documentElement.getAttribute("data-theme");
  var next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem(STORAGE_KEY + "theme", next);
}

// ===================== 缓存 =====================

function saveCache() {
  var data = {};
  ["subUrl", "target", "remoteConfig", "customUA", "include", "exclude", "filename"].forEach(function(id) {
    data[id] = document.getElementById(id).value;
  });
  ["emoji", "udp", "tfo", "scv", "appendType", "sort", "fdn", "expand", "list"].forEach(function(id) {
    data[id] = document.getElementById(id).checked;
  });
  try { localStorage.setItem(STORAGE_KEY + "data", JSON.stringify(data)); } catch(e) {}
}

function restoreCache() {
  // 主题
  var theme = localStorage.getItem(STORAGE_KEY + "theme");
  if (theme) document.documentElement.setAttribute("data-theme", theme);

  // 表单数据
  try {
    var raw = localStorage.getItem(STORAGE_KEY + "data");
    if (!raw) return;
    var data = JSON.parse(raw);
    Object.keys(data).forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (typeof data[id] === "boolean") {
        el.checked = data[id];
      } else {
        el.value = data[id];
      }
    });
  } catch(e) {}
}

// ===================== Toast =====================

function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2000);
}

// ===================== 启动 =====================
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
